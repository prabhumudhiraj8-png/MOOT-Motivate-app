
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wa-shell{display:flex;height:640px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);font-family:var(--font-sans)}
.sidebar{width:340px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:10px 14px;background:#075e54;display:flex;align-items:center;justify-content:space-between}
.sb-me{display:flex;align-items:center;gap:8px;cursor:pointer}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;color:#fff;flex-shrink:0;font-size:22px;background:#e0e0e0!important}
.sb-me-name{color:#fff;font-size:14px;font-weight:500}
.sb-actions{display:flex;gap:14px}
.ico{color:#fff;font-size:15px;cursor:pointer;opacity:.85;background:none;border:none;padding:0}
.search-wrap{padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.search-wrap input{width:100%;background:var(--color-background-secondary);border:none;border-radius:20px;padding:7px 14px;font-size:14px;color:var(--color-text-primary);outline:none}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent}
.tab.active{color:#075e54;border-bottom:2px solid #075e54;font-weight:500}
.chat-list{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.ci:hover,.ci.active{background:var(--color-background-secondary)}
.ci-body{flex:1;min-width:0}
.ci-top{display:flex;justify-content:space-between}
.ci-name{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.ci-time{font-size:11px;color:var(--color-text-secondary);flex-shrink:0}
.ci-bot{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.ci-prev{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.badge{background:#25d366;color:#fff;border-radius:50%;min-width:17px;height:17px;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 4px;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f2f5;gap:10px}
.empty .eico{font-size:44px;opacity:.25}
.empty p{font-size:13px;color:var(--color-text-secondary)}
.chat-hd{padding:9px 14px;background:#075e54;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-info{flex:1}
.ch-name{font-size:14px;font-weight:500;color:#fff}
.ch-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:4px;background:#e5ddd5}
.date-div{text-align:center;margin:6px 0}
.date-div span{background:rgba(255,255,255,.85);border-radius:6px;padding:2px 10px;font-size:11px;color:#666}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.out{flex-direction:row-reverse}
.bubble{max-width:68%;padding:6px 9px 4px;border-radius:7px;font-size:13px;line-height:1.4;position:relative}
.bubble.in{background:#fff;color:#111;border-top-left-radius:0}
.bubble.out{background:#dcf8c6;color:#111;border-top-right-radius:0}
.bubble .sender{font-size:11px;font-weight:500;margin-bottom:2px}
.bubble .meta{display:flex;justify-content:flex-end;align-items:center;gap:3px;margin-top:2px}
.bubble .meta .ts{font-size:10px;color:#999}
.tks{font-size:11px;color:#53bdeb}
.rxns{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.rxn-pill{background:rgba(0,0,0,.07);border-radius:10px;padding:1px 5px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:2px}
.rxn-pill .rc{font-size:11px;color:#555}
.emoji-picker{display:none;position:absolute;z-index:10;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:6px;gap:4px;flex-wrap:wrap;width:180px}
.emoji-picker.show{display:flex}
.ep-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px;border-radius:4px}
.ep-btn:hover{background:var(--color-background-secondary)}
.msg-wrap{position:relative}
.msg-wrap:hover .react-btn{display:flex}
.react-btn{display:none;background:rgba(255,255,255,.9);border:0.5px solid var(--color-border-tertiary);border-radius:50%;width:22px;height:22px;align-items:center;justify-content:center;cursor:pointer;font-size:13px;margin-bottom:4px;flex-shrink:0}
.inp-area{padding:7px 10px;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;background:var(--color-background-secondary)}
.inp-area input{flex:1;border:none;border-radius:20px;padding:8px 14px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.send-btn{width:36px;height:36px;border-radius:50%;background:#25d366;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{fill:#fff}
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:20;align-items:center;justify-content:center;border-radius:var(--border-radius-lg)}
.modal-overlay.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:20px;width:300px;border:0.5px solid var(--color-border-tertiary)}
.modal h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:14px}
.modal input,.modal select{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--color-text-primary);background:var(--color-background-primary);outline:none;margin-bottom:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-sec{background:none;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary)}
.btn-pri{background:#075e54;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#fff}
.profile-av{width:70px;height:70px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:#fff}
.profile-name{text-align:center;font-size:16px;font-weight:500;color:var(--color-text-primary)}
.profile-num{text-align:center;font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.profile-status{text-align:center;font-size:12px;color:#25d366;margin-top:4px;margin-bottom:12px}
.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field-row label{font-size:11px;color:var(--color-text-secondary)}
.field-row input{margin-bottom:0}
.grp-chk-list{max-height:140px;overflow-y:auto;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:6px;margin-bottom:10px}
.grp-chk{display:flex;align-items:center;gap:8px;padding:5px 4px;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.grp-chk input{width:15px;height:15px;cursor:pointer}
.g-pill{display:inline-flex;align-items:center;gap:4px;background:var(--color-background-secondary);border-radius:12px;padding:2px 8px;font-size:11px;color:var(--color-text-secondary);margin:2px}
</style>

<div style="position:relative">
<div class="wa-shell" id="shell">

  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-me" onclick="showProfile()">
        <div class="av" id="myAv" style="width:34px;height:34px;background:transparent;font-size:22px">😊</div>
        <div>
          <div style="color:#fff;font-size:15px;font-weight:700;letter-spacing:0.5px">MOOT 💬</div>
          <div style="color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:1px">MOTIVATE APP</div>
        </div>
      </div>
      <div class="sb-actions">
        <button class="ico" onclick="showAddContact()" title="New chat">&#43;</button>
        <button class="ico" onclick="showNewGroup()" title="New group">&#128101;</button>
      </div>
    </div>
    <div class="search-wrap"><input id="searchInput" placeholder="Search chats" oninput="renderList()"/></div>
    <div class="tabs">
      <div class="tab active" id="tab-all" onclick="setTab('all')">All</div>
      <div class="tab" id="tab-contacts" onclick="setTab('contacts')">Contacts</div>
      <div class="tab" id="tab-groups" onclick="setTab('groups')">Groups</div>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="main" id="mainPane">
    <div class="empty"><div class="eico">💬</div><p style="font-weight:600;font-size:15px">Welcome to MOOT</p><p style="font-size:12px;margin-top:4px">Select a chat to get motivated!</p></div>
  </div>

</div>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <h3>Your MOOT Profile</h3>
    <div class="profile-av" id="profileAvModal" style="background:transparent;font-size:40px">😊</div>
    <div class="profile-name" id="profileNameModal">You</div>
    <div class="profile-num" id="profileNumModal">+91 00000 00000</div>
    <div class="profile-status">Online</div>
    <div class="field-row"><label>Name</label><input id="editName" value="You"/></div>
    <div class="field-row"><label>Phone</label><input id="editPhone" value="+91 00000 00000"/></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal('profileModal')">Cancel</button>
      <button class="btn-pri" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addContactModal">
  <div class="modal">
    <h3>Add new contact</h3>
    <div class="field-row"><label>Name</label><input id="newContactName" placeholder="e.g. Priya Sharma"/></div>
    <div class="field-row"><label>Phone number</label><input id="newContactPhone" placeholder="e.g. +91 98765 43210"/></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal('addContactModal')">Cancel</button>
      <button class="btn-pri" onclick="addContact()">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newGroupModal">
  <div class="modal">
    <h3>Create group</h3>
    <div class="field-row"><label>Group name</label><input id="groupName" placeholder="e.g. Friends"/></div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">Select members</div>
    <div class="grp-chk-list" id="memberCheckList"></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal('newGroupModal')">Cancel</button>
      <button class="btn-pri" onclick="createGroup()">Create</button>
    </div>
  </div>
</div>

</div>

<script>
const ME={name:'You',phone:'+91 00000 00000',initials:'😊',color:'#075e54'};
const EMOJIS=['❤️','😂','😮','😢','👍','🔥'];
const COLORS=['#6b4fbb','#1e7e6e','#d35400','#c0392b','#2980b9','#7d3c98','#1a5276','#784212'];
let activeId=null,currentTab='all',epTarget=null;

// Profile emoji pool — every contact/group uses one of these
const PROFILE_EMOJIS=['🌸','🦋','🌟','🎯','🦁','🐼','🌈','🎸','🍀','🦊','🌻','🐬','🎀','🦄','🐯','🌺','🎭','🦅','🍁','🐸','🌙','🦋'];

let contacts=[
  {id:1,type:'contact',name:'Priya Sharma',phone:'+91 98765 43210',initials:'🌸',color:COLORS[0],status:'online',unread:2,lastTime:'10:32 AM',msgs:[
    {id:1,text:'Hey! Coming to the office tomorrow?',out:false,time:'10:28 AM',reactions:{}},
    {id:2,text:'Yes! What time?',out:true,time:'10:30 AM',reactions:{}},
    {id:3,text:'9 AM sharp 😄',out:false,time:'10:32 AM',reactions:{}}
  ]},
  {id:2,type:'contact',name:'Rahul Verma',phone:'+91 91234 56789',initials:'🦁',color:COLORS[1],status:'last seen 1h ago',unread:0,lastTime:'9:15 AM',msgs:[
    {id:1,text:'Can you send me the project files?',out:false,time:'9:10 AM',reactions:{}},
    {id:2,text:'Sure, sending now!',out:true,time:'9:15 AM',reactions:{}}
  ]},
  {id:3,type:'contact',name:'Mom',phone:'+91 99887 76655',initials:'🌻',color:COLORS[3],status:'online',unread:1,lastTime:'Tuesday',msgs:[
    {id:1,text:'Call me when free beta ❤️',out:false,time:'Tuesday',reactions:{}}
  ]},
  {id:4,type:'contact',name:'Arjun Mehta',phone:'+91 87654 32100',initials:'🎯',color:COLORS[5],status:'last seen Monday',unread:0,lastTime:'Monday',msgs:[
    {id:1,text:'Great work on the presentation!',out:false,time:'Monday',reactions:{}}
  ]},
  {id:5,type:'contact',name:'Sneha Iyer',phone:'+91 70011 22334',initials:'🦋',color:COLORS[6],status:'online',unread:3,lastTime:'Just now',msgs:[
    {id:1,text:'Did you see the match last night?',out:false,time:'Just now',reactions:{}},
    {id:2,text:'India won!! 🏏',out:false,time:'Just now',reactions:{}}
  ]},
  {id:10,type:'group',name:'Friends Group',initials:'🌈',color:COLORS[2],status:'5 members',unread:4,lastTime:'10:45 AM',members:[1,2,4,5],msgs:[
    {id:1,text:'Hey everyone!',sender:'Priya Sharma',sColor:COLORS[0],out:false,time:'10:40 AM',reactions:{}},
    {id:2,text:'What are we doing this weekend?',sender:'Rahul Verma',sColor:COLORS[1],out:false,time:'10:41 AM',reactions:{}},
    {id:3,text:'Beach trip sounds great!',out:true,time:'10:43 AM',reactions:{}},
    {id:4,text:'Count me in! 🏖️',sender:'Arjun Mehta',sColor:COLORS[5],out:false,time:'10:45 AM',reactions:{}}
  ]},
  {id:11,type:'group',name:'Work Team',initials:'🎸',color:COLORS[7],status:'3 members',unread:0,lastTime:'Yesterday',members:[1,2],msgs:[
    {id:1,text:'Sprint review at 3 PM',sender:'Priya Sharma',sColor:COLORS[0],out:false,time:'Yesterday',reactions:{}},
    {id:2,text:'Noted, will be there',out:true,time:'Yesterday',reactions:{}}
  ]}
];

let msgCounter=100;

// All the friendly/motivational messages contacts send when you're online
const ONLINE_MESSAGES = [
  'How are you? 😊','Did you eat? 🍱','Nice to see you online again! 😄','Keep it up! 💪',
  'You can do this! 🔥','Don\'t give up! 🌟','Focus on your goal! 🎯','Never give up! 💯',
  'Make today count! ✨','Break your limits! 🚀','Don\'t stop now! 🏃','I have to do this! 💪',
  'I will do this! 🙌','Success takes time, stay patient! ⏳','Dream big, work hard! 🌠',
  'Keep going, you\'re almost there! 🎯','Be fearless! 🦁','Focus on progress, not perfection! 📈',
  'Pain makes you stronger! 💎','Every step counts! 👣','Believe in yourself! 🌈',
  'You\'re doing amazing! 🥰','So good to see you here! 😃','Thinking of you! 💭',
  'Have a wonderful day! 🌸','Stay strong, you got this! 🌟','You inspire me every day! 🌻',
  'Rooting for you always! 🤗','Sending you good vibes! 🌊','You\'re unstoppable! ⚡',
  'Rise and shine! ☀️','Today is your day! 🎉','Keep smiling! 😁','You matter! ❤️',
  'The best is yet to come! 🌅','Your hard work will pay off! 🏆','Stay positive! 🌈',
  'You\'re stronger than you think! 💪','Missing you, glad you\'re here! 🤍','Just checking in on you! 💛',
  'Don\'t forget to take breaks too! 🍃','So proud of you! 🥹','You light up everything! ☀️'
];

// Track which contacts have already sent an online-greeting this session
const greetedContacts = new Set();

// When app loads, schedule friendly messages from online contacts after a short delay
function scheduleOnlineGreetings() {
  const onlineContacts = contacts.filter(c => c.type === 'contact' && c.status === 'online');
  onlineContacts.forEach((c, i) => {
    // First greeting comes in staggered quickly
    const firstDelay = 3000 + i * 2000;
    setTimeout(() => deliverMessage(c.id), firstDelay);
    // Then keep sending periodic motivational messages every 18–35 seconds
    const interval = 18000 + Math.random() * 17000;
    setInterval(() => deliverMessage(c.id), interval + firstDelay);
  });
}

function deliverMessage(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  const text = ONLINE_MESSAGES[Math.floor(Math.random() * ONLINE_MESSAGES.length)];
  const t = getTime();
  const msg = {id: ++msgCounter, text, out: false, time: t, reactions: {}};
  c.msgs.push(msg);
  c.lastTime = 'Just now';

  const area = document.getElementById('msgArea');
  if (activeId === id && area) {
    // Chat is open — append bubble directly
    area.appendChild(buildBubble(msg, id, false));
    area.scrollTop = area.scrollHeight;
  } else {
    // Chat is not open — increment unread badge
    c.unread = (c.unread || 0) + 1;
  }
  renderList();
}


function getTime(){const n=new Date();return n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}
function initials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function lastMsg(c){const m=c.msgs;return m.length?m[m.length-1].text:'';} 

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=document.getElementById('chatList');
  list.innerHTML='';
  const sorted=[...contacts].sort((a,b)=>{
    const ta=a.lastTime,tb=b.lastTime;
    const order=['Just now','10:45 AM','10:32 AM','10:43 AM','9:15 AM','Tuesday','Monday','Yesterday'];
    const ai=order.indexOf(ta),bi=order.indexOf(tb);
    if(ai===-1&&bi===-1)return 0;
    if(ai===-1)return 1;
    if(bi===-1)return -1;
    return ai-bi;
  });
  sorted.forEach(c=>{
    if(currentTab==='contacts'&&c.type!=='contact')return;
    if(currentTab==='groups'&&c.type!=='group')return;
    if(q&&!c.name.toLowerCase().includes(q))return;
    const el=document.createElement('div');
    el.className='ci'+(activeId===c.id?' active':'');
    el.onclick=()=>openChat(c.id);
    const groupPfx=c.type==='group'?`<span style="font-size:11px;color:#25d366;margin-right:2px">&#128101;</span>`:'';
    el.innerHTML=`<div class="av" style="width:44px;height:44px;background:transparent;font-size:28px">${c.initials}</div>
    <div class="ci-body">
      <div class="ci-top"><span class="ci-name">${groupPfx}${c.name}</span><span class="ci-time">${c.lastTime}</span></div>
      <div class="ci-bot"><span class="ci-prev">${lastMsg(c)}</span>${c.unread?`<span class="badge">${c.unread}</span>`:''}</div>
    </div>`;
    list.appendChild(el);
  });
}

function setTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  renderList();
}

function openChat(id){
  activeId=id;
  contacts.find(x=>x.id===id).unread=0;
  renderList();
  const c=contacts.find(x=>x.id===id);
  const main=document.getElementById('mainPane');
  const isGroup=c.type==='group';
  const memberNames=isGroup?c.members.map(mid=>{const m=contacts.find(x=>x.id===mid);return m?m.name:'';}).join(', '):'';
  main.innerHTML=`
    <div class="chat-hd">
      <div class="av" style="width:38px;height:38px;background:transparent;font-size:26px">${c.initials}</div>
      <div class="ch-info">
        <div class="ch-name">${c.name}</div>
        <div class="ch-sub">${isGroup?memberNames:c.status}</div>
      </div>
    </div>
    <div class="msgs" id="msgArea"></div>
    <div class="inp-area">
      <span style="font-size:16px;cursor:pointer">&#128578;</span>
      <input id="msgInput" placeholder="Type a message" onkeydown="if(event.key==='Enter')sendMsg(${id})"/>
      <button class="send-btn" onclick="sendMsg(${id})"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>`;
  renderMsgs(id);
  document.getElementById('msgInput').focus();
}

function renderMsgs(id){
  const c=contacts.find(x=>x.id===id);
  const area=document.getElementById('msgArea');
  if(!area)return;
  area.innerHTML=`<div class="date-div"><span>Today</span></div>`;
  c.msgs.forEach(m=>{
    area.appendChild(buildBubble(m,id,c.type==='group'));
  });
  area.scrollTop=area.scrollHeight;
}

function buildBubble(m,chatId,isGroup){
  const row=document.createElement('div');
  row.className='mr'+(m.out?' out':'');
  const rxnHtml=Object.entries(m.reactions||{}).map(([em,count])=>`<span class="rxn-pill" onclick="toggleRxn(${chatId},${m.id},'${em}')"><span>${em}</span><span class="rc">${count}</span></span>`).join('');
  const senderHtml=isGroup&&!m.out&&m.sender?`<div class="sender" style="color:${m.sColor||'#075e54'}">${m.sender}</div>`:'';
  const bubbleContent=`<div class="msg-wrap" style="position:relative">
    <div class="bubble ${m.out?'out':'in'}" id="bubble-${m.id}">
      ${senderHtml}
      <span>${m.text}</span>
      ${rxnHtml?`<div class="rxns" id="rxns-${m.id}">${rxnHtml}</div>`:`<div class="rxns" id="rxns-${m.id}"></div>`}
      <div class="meta"><span class="ts">${m.time}</span>${m.out?'<span class="tks">✓✓</span>':''}</div>
    </div>
    <div id="ep-${m.id}" class="emoji-picker">${EMOJIS.map(e=>`<button class="ep-btn" onclick="addRxn(${chatId},${m.id},'${e}')">${e}</button>`).join('')}</div>
  </div>`;
  if(m.out){
    row.innerHTML=`<button class="react-btn" onclick="togglePicker(${m.id})">&#128578;</button>${bubbleContent}`;
  } else {
    row.innerHTML=`${bubbleContent}<button class="react-btn" onclick="togglePicker(${m.id})">&#128578;</button>`;
  }
  return row;
}

function togglePicker(mid){
  document.querySelectorAll('.emoji-picker').forEach(ep=>{
    if(ep.id!=='ep-'+mid)ep.classList.remove('show');
  });
  document.getElementById('ep-'+mid).classList.toggle('show');
}

function addRxn(chatId,msgId,emoji){
  const c=contacts.find(x=>x.id===chatId);
  const m=c.msgs.find(x=>x.id===msgId);
  if(!m.reactions)m.reactions={};
  m.reactions[emoji]=(m.reactions[emoji]||0)+1;
  document.getElementById('ep-'+msgId).classList.remove('show');
  const rxnDiv=document.getElementById('rxns-'+msgId);
  if(rxnDiv){
    rxnDiv.innerHTML=Object.entries(m.reactions).map(([em,count])=>`<span class="rxn-pill" onclick="toggleRxn(${chatId},${msgId},'${em}')"><span>${em}</span><span class="rc">${count}</span></span>`).join('');
  }
}

function toggleRxn(chatId,msgId,emoji){
  const c=contacts.find(x=>x.id===chatId);
  const m=c.msgs.find(x=>x.id===msgId);
  if(m.reactions[emoji]>1)m.reactions[emoji]--;
  else delete m.reactions[emoji];
  const rxnDiv=document.getElementById('rxns-'+msgId);
  if(rxnDiv){
    rxnDiv.innerHTML=Object.entries(m.reactions).map(([em,count])=>`<span class="rxn-pill" onclick="toggleRxn(${chatId},${msgId},'${em}')"><span>${em}</span><span class="rc">${count}</span></span>`).join('');
  }
}

function sendMsg(id){
  const inp=document.getElementById('msgInput');
  const val=inp.value.trim();
  if(!val)return;
  const c=contacts.find(x=>x.id===id);
  const t=getTime();
  const newMsg={id:++msgCounter,text:val,out:true,time:t,reactions:{}};
  c.msgs.push(newMsg);
  c.lastTime='Just now';
  inp.value='';
  const area=document.getElementById('msgArea');
  if(area){area.appendChild(buildBubble(newMsg,id,c.type==='group'));area.scrollTop=area.scrollHeight;}
  renderList();
  if(c.type==='group'){
    setTimeout(()=>groupReply(id),1000+Math.random()*800);
  } else {
    setTimeout(()=>autoReply(id),1000+Math.random()*600);
  }
}

function autoReply(id){
  const replies=['Got it! 👍','Sounds good! 😊','Haha 😄','Thanks! 🙌','Sure, on it!','Ok! 👌','Great news! 🎉','Will check!',
    'You\'re amazing! 💫','Stay strong! 💪','Keep going! 🔥','That\'s the spirit! 🌟','So proud of you! 🥹',
    'You can do it! 🎯','Never stop! 🚀','Dream big! 🌠','Love your energy! ❤️'];
  const c=contacts.find(x=>x.id===id);
  const t=getTime();
  const msg={id:++msgCounter,text:replies[Math.floor(Math.random()*replies.length)],out:false,time:t,reactions:{}};
  c.msgs.push(msg);c.lastTime='Just now';
  const area=document.getElementById('msgArea');
  if(area&&activeId===id){area.appendChild(buildBubble(msg,id,false));area.scrollTop=area.scrollHeight;}
  renderList();
}

function groupReply(id){
  const c=contacts.find(x=>x.id===id);
  const grpReplies=['Agreed!','Sounds fun! 🎉','Count me in!','Let\'s do it!','Nice idea 👍','Haha yes!','When exactly?'];
  const memberIds=c.members||[];
  const randomMid=memberIds[Math.floor(Math.random()*memberIds.length)];
  const member=contacts.find(x=>x.id===randomMid);
  if(!member)return;
  const t=getTime();
  const msg={id:++msgCounter,text:grpReplies[Math.floor(Math.random()*grpReplies.length)],sender:member.name,sColor:member.color,out:false,time:t,reactions:{}};
  c.msgs.push(msg);c.lastTime='Just now';
  const area=document.getElementById('msgArea');
  if(area&&activeId===id){area.appendChild(buildBubble(msg,id,true));area.scrollTop=area.scrollHeight;}
  renderList();
}

function showProfile(){
  document.getElementById('editName').value=ME.name;
  document.getElementById('editPhone').value=ME.phone;
  document.getElementById('profileNameModal').textContent=ME.name;
  document.getElementById('profileNumModal').textContent=ME.phone;
  document.getElementById('profileAvModal').textContent=ME.initials;
  document.getElementById('profileModal').classList.add('show');
}

function saveProfile(){
  ME.name=document.getElementById('editName').value||ME.name;
  ME.phone=document.getElementById('editPhone').value||ME.phone;
  ME.initials=initials(ME.name);
  document.getElementById('myAv').textContent=ME.initials;
  document.getElementById('myNameLabel').textContent=ME.name;
  closeModal('profileModal');
}

function showAddContact(){
  document.getElementById('newContactName').value='';
  document.getElementById('newContactPhone').value='';
  document.getElementById('addContactModal').classList.add('show');
}

function addContact(){
  const name=document.getElementById('newContactName').value.trim();
  const phone=document.getElementById('newContactPhone').value.trim();
  if(!name||!phone)return;
  const newId=Date.now();
  const emoji=PROFILE_EMOJIS[contacts.length%PROFILE_EMOJIS.length];
  contacts.unshift({id:newId,type:'contact',name,phone,initials:emoji,color:COLORS[contacts.length%COLORS.length],status:'online',unread:0,lastTime:'Just now',msgs:[]});
  closeModal('addContactModal');
  renderList();
  // New contact says hi after a moment
  setTimeout(()=>deliverMessage(newId),3000);
}

function showNewGroup(){
  document.getElementById('groupName').value='';
  const list=document.getElementById('memberCheckList');
  list.innerHTML=contacts.filter(c=>c.type==='contact').map(c=>`<label class="grp-chk"><input type="checkbox" value="${c.id}"> ${c.name} <span style="color:var(--color-text-secondary);font-size:11px">${c.phone}</span></label>`).join('');
  document.getElementById('newGroupModal').classList.add('show');
}

function createGroup(){
  const name=document.getElementById('groupName').value.trim();
  const checked=[...document.querySelectorAll('#memberCheckList input:checked')].map(el=>parseInt(el.value));
  if(!name||!checked.length)return;
  const newId=Date.now();
  const emoji=PROFILE_EMOJIS[Math.floor(Math.random()*PROFILE_EMOJIS.length)];
  contacts.unshift({id:newId,type:'group',name,initials:emoji,color:COLORS[Math.floor(Math.random()*COLORS.length)],status:`${checked.length+1} members`,unread:0,lastTime:'Just now',members:checked,msgs:[]});
  closeModal('newGroupModal');
  renderList();
}

function closeModal(id){document.getElementById(id).classList.remove('show');}

document.addEventListener('click',e=>{
  if(!e.target.closest('.emoji-picker')&&!e.target.closest('.react-btn')){
    document.querySelectorAll('.emoji-picker').forEach(ep=>ep.classList.remove('show'));
  }
  ['profileModal','addContactModal','newGroupModal'].forEach(mid=>{
    const el=document.getElementById(mid);
    if(el&&e.target===el)closeModal(mid);
  });
});

renderList();
scheduleOnlineGreetings();
</script>
